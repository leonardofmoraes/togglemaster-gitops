name: self-healing

on:
  workflow_dispatch:
    inputs:
      deployment:
        description: "Nome do deployment a reiniciar"
        required: true
        default: "auth-service"
      namespace:
        description: "Namespace do Kubernetes"
        required: true
        default: "default"

jobs:

  restart-deployment:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

      - name: Restart deployment (self-healing)
        run: |
          kubectl rollout restart deployment/${{ github.event.inputs.deployment }} -n ${{ github.event.inputs.namespace }}

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/${{ github.event.inputs.deployment }} -n ${{ github.event.inputs.namespace }}