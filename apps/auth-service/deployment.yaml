apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: togglemaster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: 407098684727.dkr.ecr.us-east-1.amazonaws.com/togglemaster-dev-auth-service:latest
          ports:
            - containerPort: 8001
          env:
            - name: PORT
              value: "8001"
            - name: DB_USER
              value: "toggleadmin"
            - name: DB_HOST
              value: "togglemaster-dev-auth-db.cfihdvxwcxdd.us-east-1.rds.amazonaws.com"
            - name: DB_NAME
              value: "auth_db"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: togglemaster-secrets
                  key: DB_PASSWORD
            - name: DATABASE_URL
              value: "postgres://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):5432/$(DB_NAME)"
            - name: MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: togglemaster-secrets
                  key: MASTER_KEY
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4317"
            - name: SERVICE_VERSION
              value: "1.0.0"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: togglemaster
spec:
  selector:
    app: auth-service
  ports:
    - port: 8001
      targetPort: 8001