apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-togglemaster-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  togglemaster-overview.json: |
    {
      "title": "ToggleMaster - Visão Geral",
      "uid": "togglemaster-overview",
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "time": { "from": "now-30m", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "CPU por pod (namespace togglemaster)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"togglemaster\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Memória por pod (namespace togglemaster)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"togglemaster\"}) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 3,
          "title": "Taxa de requisições por microsserviço",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_total{namespace=\"togglemaster\"}[5m])) by (service)",
              "legendFormat": "{{service}}"
            }
          ],
          "description": "Depende da métrica exportada pelo OTel Collector (próximo passo). Ajuste o nome da métrica conforme o exporter Prometheus do Collector."
        },
        {
          "id": 4,
          "title": "Logs em tempo real - togglemaster",
          "type": "logs",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "expr": "{namespace=\"togglemaster\"}"
            }
          ]
        }
      ]
    }